<html lang="en">

  <meta name="description" content="Generate fluid CSS clamp() values that scale any length between two viewports.">

  <style>
/* ============================================================
   Alex Ghit — shared design system (base.css)
   Source of truth for tokens, topbar, buttons, toggles, footer.
   Drop this into each tool's repo and link it BEFORE the tool's
   own stylesheet. App-specific CSS overrides only the middle.
   ============================================================ */

:root{
  /* surfaces */
  --bg:#0c0c0e;
  --surface:#141416;
  --surface-2:#1c1c1f;
  --line:rgba(255,255,255,.08);
  --line-strong:rgba(255,255,255,.14);
  --field-bg:#131315;

  /* ink */
  --ink:rgba(255,255,255,.94);
  --muted:rgba(255,255,255,.5);
  --faint:rgba(255,255,255,.3);
  --accent:rgba(255,255,255,.30);

  /* type */
  --sans:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'Geist Mono',ui-monospace,monospace;
  --serif:'Instrument Serif',Georgia,serif;

  /* motion */
  --ease:cubic-bezier(.22,1,.36,1);
  --t:200ms;

  --radius:14px;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{height:100%;-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{
  min-height:100vh;
  min-height:100svh;
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
}
::selection{background:var(--accent);color:var(--bg)}
button{touch-action:manipulation;-webkit-tap-highlight-color:transparent}

/* ---------- topbar ---------- */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:32px 40px;
  font-family:var(--mono);
  font-size:12px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--muted);
}
.wordmark{
  font:inherit;
  letter-spacing:inherit;
  text-transform:inherit;
  color:var(--muted);
  background:none;
  border:none;
  padding:0;
  cursor:pointer;
  transition:color var(--t);
}
.wordmark:hover{color:rgba(255,255,255,.85)}
.topbar-tag{color:var(--faint)}

/* ---------- primary button (white pill) ---------- */
.btn-primary{
  cursor:pointer;
  font-family:var(--mono);
  font-size:12px;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--bg);
  background:rgba(255,255,255,.94);
  border:none;
  border-radius:999px;
  padding:11px 20px;
  transition:opacity var(--t),transform 140ms var(--ease),background 140ms;
}
.btn-primary:hover{opacity:.85}
.btn-primary:active{transition:none;transform:scale(.94)}
.btn-primary:disabled{opacity:.35;pointer-events:none}

/* ---------- secondary button (outline pill) ---------- */
.btn-ghost{
  cursor:pointer;
  font-family:var(--mono);
  font-size:12px;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--ink);
  background:transparent;
  border:1px solid var(--line-strong);
  border-radius:999px;
  padding:11px 20px;
  transition:border-color var(--t),background var(--t),transform 140ms var(--ease);
}
.btn-ghost:hover{border-color:rgba(255,255,255,.4)}
.btn-ghost:active{transition:none;transform:scale(.94)}
.btn-ghost:disabled{opacity:.35;pointer-events:none}

/* ---------- segmented toggle ---------- */
.segs{
  display:inline-flex;
  gap:4px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--line);
  border-radius:999px;
  padding:4px;
}
.segs button{
  cursor:pointer;
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.04em;
  white-space:nowrap;
  border:none;
  border-radius:999px;
  padding:8px 14px;
  background:transparent;
  color:var(--muted);
  transition:background 220ms,color 220ms,transform 140ms var(--ease);
}
.segs button:hover{color:rgba(255,255,255,.85)}
.segs button:active{transition:none;transform:scale(.94)}
.segs button[aria-pressed="true"]{background:rgba(255,255,255,.92);color:var(--bg)}

/* ---------- hint / kbd ---------- */
.hint{
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.06em;
  color:var(--faint);
}
.hint kbd{
  font-family:var(--mono);
  font-size:inherit;
  padding:2px 6px;
  border-radius:5px;
  border:1px solid var(--line-strong);
  background:rgba(255,255,255,.05);
  color:var(--muted);
}

/* ---------- footer ---------- */
.footer{
  flex-shrink:0;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  gap:8px;
  padding:28px 24px 32px;
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.04em;
  color:var(--faint);
  text-align:center;
}
.footer a{
  color:var(--muted);
  text-decoration:none;
  border-bottom:1px solid var(--line-strong);
  transition:color var(--t),border-color var(--t);
}
.footer a:hover{color:rgba(255,255,255,.85);border-bottom-color:rgba(255,255,255,.4)}
.footer .dot{opacity:.5}

/* ---------- focus ---------- */
.btn-primary:focus-visible,
.btn-ghost:focus-visible,
.segs button:focus-visible,
.footer a:focus-visible{
  outline:2px solid var(--accent);
  outline-offset:2px;
}

@media (max-width:600px){
  .topbar{padding:24px 20px;font-size:11px}
  .footer{flex-direction:column;gap:14px;padding:24px 20px 30px;line-height:1.5}
  .footer .dot{display:none}
}

@media (prefers-reduced-motion:reduce){
  *{animation:none !important;transition-duration:.01ms !important}
}

/* Fluid Size — app-specific styles. Shared tokens, topbar,
   buttons (.btn-primary/.btn-ghost), .segs, .hint and .footer
   now live in base.css (linked first). */

.app{min-height:100vh;width:100%;display:flex;flex-direction:column}

/* Stage */
.stage{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:12px 24px 48px;
}
.panel{width:100%;max-width:560px;display:flex;flex-direction:column}

/* Preview */
.segmented--sm{padding:3px;gap:3px}
.segmented--sm button{font-size:11px;padding:5px 11px}

.preview-stage{
  height:190px;
  margin-top:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}
.preview-stage.is-capped::after{
  content:"preview scaled to fit";
  position:absolute;
  bottom:6px;
  right:8px;
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:.04em;
  color:var(--faint);
  pointer-events:none;
}
.preview-text{
  font-weight:600;
  color:var(--ink);
  line-height:.95;
  letter-spacing:-.02em;
  font-size:56px;
  outline:none;
  cursor:text;
  caret-color:rgba(255,255,255,.6);
  border-radius:10px;
  padding:0 6px;
  max-width:100%;
  white-space:nowrap;
  text-align:center;
}
.preview-text.is-placeholder-size{color:var(--faint)}
.preview-element.is-placeholder-size{opacity:.3}
.preview-text:empty::before{
  content:attr(data-placeholder);
  color:rgba(255,255,255,.25);
  font-size:40px;
}
.preview-element{
  background:#e9e9ec;
  border-radius:22%;
  width:56px;
  height:56px;
}

/* Slider */
.slider-block{margin-top:24px;display:flex;flex-direction:column;gap:12px}
.range{
  -webkit-appearance:none;
  appearance:none;
  background:transparent;
  cursor:pointer;
  height:18px;
  width:100%;
}
.range::-webkit-slider-runnable-track{height:2px;border-radius:999px;background:var(--line-strong)}
.range::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;margin-top:-8px;
  width:16px;height:16px;border-radius:50%;
  background:rgba(255,255,255,.94);border:4px solid var(--bg);
  box-shadow:0 0 0 1px rgba(255,255,255,.35);
}
.range::-moz-range-track{height:2px;border-radius:999px;background:var(--line-strong)}
.range::-moz-range-thumb{
  width:12px;height:12px;border:4px solid var(--bg);
  border-radius:50%;background:rgba(255,255,255,.94);
  box-shadow:0 0 0 1px rgba(255,255,255,.35);
}
.range:focus-visible{outline:none}
.range:focus-visible::-webkit-slider-thumb{box-shadow:0 0 0 2px rgba(255,255,255,.7)}
.range:focus-visible::-moz-range-thumb{box-shadow:0 0 0 2px rgba(255,255,255,.7)}

.slider-labels{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
  font-family:var(--mono);
  font-size:12px;
  color:var(--muted);
}
.slider-meta{display:flex;align-items:center;gap:8px}
.slider-sep{opacity:.4}
.slider-labels .val{color:var(--ink)}

/* Editable viewport field — reads as text until hovered/focused */
.vp-field{display:inline-flex;align-items:center;gap:5px}
.vp-input{
  /* 4ch exactly fits "1440" with no room for padding/caret — size to the
     content box and add slack so 4-digit values never clip */
  box-sizing:content-box;
  width:4.5ch;
  background:transparent;
  border:none;
  border-bottom:1px dashed rgba(255,255,255,.22);
  outline:none;
  padding:2px 4px;
  color:var(--ink);
  font-family:var(--mono);
  font-size:12px;
  text-align:center;
  transition:border-color 160ms,background 160ms;
}
.vp-input:hover{border-bottom-color:rgba(255,255,255,.45)}
.vp-input:focus{
  border-bottom-color:rgba(255,255,255,.7);
  background:rgba(255,255,255,.04);
  border-radius:4px 4px 0 0;
}
.vp-unit{color:var(--muted)}
.vp-reset{
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  /* comfortable tap target — the glyph alone was far too small to hit */
  width:22px;
  height:22px;
  flex-shrink:0;
  background:none;
  border:none;
  padding:0;
  margin-left:2px;
  border-radius:6px;
  color:var(--muted);
  transition:color 160ms,background 160ms,transform 220ms var(--ease);
}
.vp-reset:hover{color:var(--ink);background:rgba(255,255,255,.07)}
.vp-reset svg{width:14px;height:14px;display:block}
.vp-reset:active{transform:rotate(-140deg)}
.vp-reset[hidden]{display:none}
.vp-reset:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

.divider{height:1px;background:var(--line);margin:40px 0 36px}

/* Fields */
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.field-grid--gap{margin-top:18px}
.field{display:flex;flex-direction:column;gap:10px}
.field-label{font-size:15px;font-weight:500;color:#e8e8ea}
.field-input{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--field-bg);
  border:1px solid rgba(255,255,255,.1);
  border-radius:12px;
  padding:14px 16px;
  transition:border-color 160ms;
}
.field-input:focus-within{border-color:rgba(255,255,255,.28)}
.num{
  -moz-appearance:textfield;
  appearance:textfield;
  background:transparent;
  border:none;
  outline:none;
  width:100%;
  color:var(--ink);
  font-family:var(--mono);
  font-size:20px;
  letter-spacing:.01em;
}
.num::placeholder{color:rgba(255,255,255,.25)}
.num::-webkit-outer-spin-button,
.num::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.unit{font-family:var(--mono);font-size:13px;color:var(--faint)}

.unit-toggle{display:flex;justify-content:center;margin-top:28px}

/* Output */
.warn{
  margin-top:20px;
  font-family:var(--mono);
  font-size:12px;
  color:#ffb4a2;
  background:rgba(255,120,90,.08);
  border:1px solid rgba(255,120,90,.25);
  border-radius:10px;
  padding:10px 14px;
}
.warn[hidden]{display:none}
.warn a{color:inherit;text-decoration:underline}
.warn--soft{
  color:#ffd9a0;
  background:rgba(255,190,90,.08);
  border-color:rgba(255,190,90,.25);
  display:flex;
  align-items:flex-start;
  gap:10px;
  line-height:1.5;
}
.warn-text{flex:1}
.warn-dismiss{
  flex-shrink:0;
  cursor:pointer;
  background:none;
  border:none;
  color:inherit;
  opacity:.55;
  font-size:13px;
  line-height:1.5;
  padding:2px 4px;
}
.warn-dismiss:hover{opacity:1}

.output-row{margin-top:32px;display:flex;flex-direction:column;gap:14px}
.output-btns{display:flex;gap:12px;justify-content:flex-end}
.output{
  width:100%;
  background:var(--surface);
  border:1px dashed rgba(255,255,255,.22);
  border-radius:12px;
  padding:15px 18px;
  font-family:var(--mono);
  font-size:15px;
  color:#dcdce0;
  overflow-x:auto;
  white-space:nowrap;
}
.hint{margin-top:16px;text-align:center;letter-spacing:.02em}

/* copied state for the primary copy button */
.copy-btn.copied{
  background:transparent;
  color:#e8e8ea;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.3);
}

@media (max-width:480px){
  .stage{padding:8px 18px 40px}
  .field-grid{gap:14px}
  .field-label{font-size:14px}
  .output-btns{justify-content:stretch}
  .output-btns .btn-primary,
  .output-btns .btn-ghost{flex:1;text-align:center}
}
  </style>
</head>
<body>
  <div class="app">

    <header class="topbar">
      <button class="wordmark" id="wordmark" type="button">Fluid Size</button>
      <span class="topbar-tag">css clamp()</span>
    </header>

    <main class="stage">
      <div class="panel">

        <div class="preview-stage">
          <span class="preview-text" id="previewText" contenteditable="true" spellcheck="false" role="textbox" aria-label="Preview text — click to edit" data-placeholder="Type text…"></span>
          <div class="preview-element" id="previewElement" hidden></div>
        </div>

        <div class="slider-block">
          <input type="range" class="range" id="viewportSlider" min="320" max="1440" step="1" value="880" aria-label="Preview viewport width">
          <div class="slider-labels">
            <span class="slider-meta">
              <span class="vp-field">viewport
                <input class="vp-input" id="viewportInput" type="text" value="880"
                       inputmode="text" autocomplete="off" autocapitalize="off"
                       spellcheck="false" aria-label="Viewport width — sets your default">
                <span class="vp-unit">px</span>
                <button type="button" class="vp-reset" id="viewportReset"
                        aria-label="Back to your default viewport" title="Back to your default" hidden>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                       stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                    <path d="M3 12a9 9 0 1 0 3-6.7L3 8"/>
                    <path d="M3 3v5h5"/>
                  </svg>
                </button>
              </span>
              <span class="slider-sep">·</span>
              <span>rendered <span class="val" id="renderedLabel">—</span></span>
            </span>
            <div class="segs segmented--sm" role="group" aria-label="Preview mode">
              <button type="button" class="seg" data-mode="text" aria-pressed="true">Text</button>
              <button type="button" class="seg" data-mode="element" aria-pressed="false">Element</button>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <div class="field-grid">
          <label class="field">
            <span class="field-label">Max size</span>
            <span class="field-input">
              <input class="num" type="text" id="maxSize" value="0" placeholder="0" inputmode="text" autocomplete="off" autocapitalize="off" spellcheck="false">
              <span class="unit">PX</span>
            </span>
          </label>
          <label class="field">
            <span class="field-label">Min size</span>
            <span class="field-input">
              <input class="num" type="text" id="minSize" value="0" placeholder="0" inputmode="text" autocomplete="off" autocapitalize="off" spellcheck="false">
              <span class="unit">PX</span>
            </span>
          </label>
        </div>

        <div class="field-grid field-grid--gap">
          <label class="field">
            <span class="field-label">Max breakpoint</span>
            <span class="field-input">
              <input class="num" type="text" id="maxBp" value="1440" placeholder="0" inputmode="text" autocomplete="off" autocapitalize="off" spellcheck="false">
              <span class="unit">PX</span>
            </span>
          </label>
          <label class="field">
            <span class="field-label">Min breakpoint</span>
            <span class="field-input">
              <input class="num" type="text" id="minBp" value="320" placeholder="0" inputmode="text" autocomplete="off" autocapitalize="off" spellcheck="false">
              <span class="unit">PX</span>
            </span>
          </label>
        </div>

        <div class="unit-toggle">
          <div class="segs" role="group" aria-label="Output unit">
            <button type="button" class="seg" data-unit="rem" aria-pressed="true">rem</button>
            <button type="button" class="seg" data-unit="px" aria-pressed="false">px</button>
          </div>
        </div>

        <p class="warn" id="warn" role="alert" hidden></p>

        <div class="output-row">
          <code class="output" id="output">clamp(...)</code>
          <div class="output-btns">
            <button type="button" class="btn-ghost" id="clearBtn">Clear</button>
            <button type="button" class="btn-primary copy-btn" id="copyBtn">Copy to Clipboard</button>
          </div>
          <p class="hint"><kbd>⌘/Ctrl</kbd>+<kbd>C</kbd> copy · <kbd>Esc</kbd> clear</p>
        </div>

      </div>
    </main>

    <footer class="footer">
      <span>Made with <span class="footer-heart">♥</span> by Alex Ghit</span>
      <span class="dot">·</span>
      <a class="footer-link" href="mailto:alex@hey5.studio">alex@hey5.studio</a>
      <span class="dot">·</span>
      <a class="footer-link" href="https://developer.mozilla.org/en-US/docs/Web/CSS/clamp" target="_blank" rel="noopener">clamp()</a>
      <span>generator</span>
      <span class="dot">·</span>
      <span class="footer-ver">v2.0</span>
    </footer>

  </div>

  <script>
(() => {
  "use strict";

  const ROOT_FONT_SIZE = 16;

  const DEFAULTS = {
    minSize: 0, maxSize: 0,
    minBp: 320, maxBp: 1440,
    unit: "rem", previewVw: 880, defaultVw: 880, mode: "text",
  };

  const state = {
    minSize: 0, maxSize: 0,
    minBp: 320, maxBp: 1440,
    unit: "rem",
    previewVw: 880,
    // the viewport the user typed — what the reset icon returns to. Distinct
    // from previewVw, which the slider moves freely.
    defaultVw: 880,
    mode: "text",
    copied: false,
  };

  const el = {
    previewText: document.getElementById("previewText"),
    previewElement: document.getElementById("previewElement"),
    previewStage: document.querySelector(".preview-stage"),
    slider: document.getElementById("viewportSlider"),
    viewportInput: document.getElementById("viewportInput"),
    viewportReset: document.getElementById("viewportReset"),
    renderedLabel: document.getElementById("renderedLabel"),
    minSize: document.getElementById("minSize"),
    maxSize: document.getElementById("maxSize"),
    minBp: document.getElementById("minBp"),
    maxBp: document.getElementById("maxBp"),
    output: document.getElementById("output"),
    copyBtn: document.getElementById("copyBtn"),
    clearBtn: document.getElementById("clearBtn"),
    warn: document.getElementById("warn"),
    wordmark: document.getElementById("wordmark"),
    modeButtons: document.querySelectorAll(".seg[data-mode]"),
    unitButtons: document.querySelectorAll(".seg[data-unit]"),
  };

  let copyTimer = null;
  let tipDismissed = false;

  const num = (v) => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };
  const fmt = (n) => (!isFinite(n) ? "0" : parseFloat(n.toFixed(3)).toString());

  // Treat x / X / × as multiplication. Only meaningful between two operands,
  // so a bare "x" or a trailing "12x" stays invalid rather than silently
  // becoming something else.
  const normalizeOps = (s) => String(s).replace(/[x×X]/g, "*");

  // Safe arithmetic: evaluates + - * / ( ) and decimals only.
  // Also accepts x and × as multiplication — common in many locales.
  // Returns a number, or null if the expression isn't valid.
  function evalExpr(input) {
    const src = normalizeOps(String(input).trim());
    if (src === "") return null;
    if (!/^[0-9+\-*/().\s]+$/.test(src)) return null;
    let i = 0;
    const peek = () => src[i];
    const skip = () => { while (/\s/.test(src[i])) i++; };
    function parseExpr() {
      let v = parseTerm();
      skip();
      while (peek() === "+" || peek() === "-") {
        const op = src[i++];
        const t = parseTerm();
        v = op === "+" ? v + t : v - t;
        skip();
      }
      return v;
    }
    function parseTerm() {
      let v = parseFactor();
      skip();
      while (peek() === "*" || peek() === "/") {
        const op = src[i++];
        const f = parseFactor();
        v = op === "*" ? v * f : v / f;
        skip();
      }
      return v;
    }
    function parseFactor() {
      skip();
      if (peek() === "+") { i++; return parseFactor(); }
      if (peek() === "-") { i++; return -parseFactor(); }
      if (peek() === "(") {
        i++;
        const v = parseExpr();
        skip();
        if (peek() !== ")") throw new Error("unbalanced");
        i++;
        return v;
      }
      const m = /^[0-9]*\.?[0-9]+/.exec(src.slice(i));
      if (!m) throw new Error("expected number");
      i += m[0].length;
      return parseFloat(m[0]);
    }
    try {
      const result = parseExpr();
      skip();
      if (i !== src.length) return null;
      return isFinite(result) ? result : null;
    } catch (e) {
      return null;
    }
  }

  function geom() {
    const { minSize, maxSize, minBp, maxBp } = state;
    const span = (maxBp - minBp) || 1;
    const slopePx = (maxSize - minSize) / span;
    const slopeVw = slopePx * 100;
    const interceptPx = minSize - slopePx * minBp;
    const lo = Math.min(minSize, maxSize);
    const hi = Math.max(minSize, maxSize);
    const sizeAt = (vw) => Math.max(lo, Math.min(hi, interceptPx + slopePx * vw));
    return { slopeVw, interceptPx, sizeAt };
  }

  // Returns a warning {html} if the inputs won't produce a sane clamp, else null.
  function problem() {
    const { minSize, maxSize, minBp, maxBp } = state;
    if (minBp === maxBp) return { text: "Min and max breakpoint can't be equal." };
    if (minBp > maxBp) return { text: "Min breakpoint is larger than max breakpoint." };
    if (minSize === maxSize && minSize !== 0) return { text: "Min and max size are equal — this won't scale." };
    if (!tipDismissed && minSize > 0 && maxSize > 0 && maxSize < minSize * 2) {
      return { html: 'For text, keep max ≥ 2× min so users can still zoom to 200%. <a href="https://www.w3.org/WAI/WCAG22/Understanding/resize-text.html" target="_blank" rel="noopener">WCAG 1.4.4</a>', soft: true };
    }
    return null;
  }

  function buildClamp() {
    const { slopeVw, interceptPx } = geom();
    const { minSize, maxSize, unit } = state;
    const lo = Math.min(minSize, maxSize), hi = Math.max(minSize, maxSize);
    const vwStr = (slopeVw >= 0 ? "+ " : "- ") + fmt(Math.abs(slopeVw)) + "vw";
    if (unit === "px") {
      return `clamp(${fmt(lo)}px, ${fmt(interceptPx)}px ${vwStr}, ${fmt(hi)}px)`;
    }
    const r = ROOT_FONT_SIZE;
    return `clamp(${fmt(lo / r)}rem, ${fmt(interceptPx / r)}rem ${vwStr}, ${fmt(hi / r)}rem)`;
  }

  function render() {
    const { minBp, maxBp, unit, mode } = state;
    const lo = Math.min(minBp, maxBp), hi = Math.max(minBp, maxBp);
    const previewVw = Math.max(lo, Math.min(hi, state.previewVw));
    state.previewVw = previewVw;

    const sizePx = geom().sizeAt(previewVw);
    // When no real size is set yet, still show the preview at a readable
    // default so typed text/element never disappears. The clamp output
    // always uses the true values.
    const displayPx = sizePx > 0 ? sizePx : 48;

    // preview mode
    const isText = mode === "text";
    el.previewText.hidden = !isText;
    el.previewElement.hidden = isText;

    if (isText) {
      const empty = el.previewText.textContent.trim() === "";
      if (empty) {
        el.previewText.style.fontSize = "";  // let placeholder use its own size
        el.previewStage.classList.remove("is-capped");
      } else {
        // Measure text at the true size once, then scale down by a ratio so
        // it always fits — no iterative loop, so no jitter while sliding.
        const stage = el.previewStage;
        const maxW = (stage.clientWidth || 400) - 24;
        const maxH = (stage.clientHeight || 190) - 24;
        el.previewText.style.fontSize = displayPx + "px";
        const w = el.previewText.scrollWidth;
        const h = el.previewText.scrollHeight;
        const ratio = Math.min(1, maxW / (w || 1), maxH / (h || 1));
        const shown = displayPx * ratio;
        el.previewText.style.fontSize = fmt(shown) + "px";
        el.previewStage.classList.toggle("is-capped", ratio < 0.999);
      }
      el.previewText.classList.toggle("is-placeholder-size", sizePx <= 0);
    } else {
      const stage = el.previewStage;
      const cap = Math.min((stage.clientWidth || 400) - 24, (stage.clientHeight || 190) - 24);
      const shown = Math.min(displayPx, cap);
      el.previewElement.style.width = fmt(shown) + "px";
      el.previewElement.style.height = fmt(shown) + "px";
      el.previewElement.classList.toggle("is-placeholder-size", sizePx <= 0);
      el.previewStage.classList.toggle("is-capped", shown < displayPx - 0.5);
    }

    // slider
    el.slider.min = lo;
    el.slider.max = hi;
    if (num(el.slider.value) !== previewVw) el.slider.value = previewVw;
    // don't fight the user while they're typing in the field
    if (document.activeElement !== el.viewportInput) {
      el.viewportInput.value = Math.round(previewVw);
    }
    // reset icon only earns its place once the preview moved off their default
    el.viewportReset.hidden = Math.round(previewVw) === Math.round(state.defaultVw);
    el.renderedLabel.textContent = unit === "px"
      ? fmt(sizePx) + "px"
      : fmt(sizePx / ROOT_FONT_SIZE) + "rem";

    // toggles
    el.modeButtons.forEach((b) =>
      b.setAttribute("aria-pressed", String(b.dataset.mode === mode)));
    el.unitButtons.forEach((b) =>
      b.setAttribute("aria-pressed", String(b.dataset.unit === unit)));

    // warning
    const msg = problem();
    el.warn.hidden = !msg;
    if (msg) {
      el.warn.classList.toggle("warn--soft", !!msg.soft);
      if (msg.soft) {
        el.warn.innerHTML =
          '<span class="warn-text">' + msg.html + '</span>' +
          '<button type="button" class="warn-dismiss" aria-label="Dismiss tip">✕</button>';
        el.warn.querySelector(".warn-dismiss")
          .addEventListener("click", () => { tipDismissed = true; render(); });
      } else if (msg.html) {
        el.warn.innerHTML = msg.html;
      } else {
        el.warn.textContent = msg.text;
      }
    }

    // output
    el.output.textContent = buildClamp();
  }

  function copy() {
    const text = buildClamp();
    const done = () => {
      state.copied = true;
      el.copyBtn.classList.add("copied");
      el.copyBtn.textContent = "Copied ✓";
      clearTimeout(copyTimer);
      copyTimer = setTimeout(() => {
        state.copied = false;
        el.copyBtn.classList.remove("copied");
        el.copyBtn.textContent = "Copy to Clipboard";
      }, 1600);
    };
    const fallback = () => {
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.select();
      try { document.execCommand("copy"); } catch (e) {}
      document.body.removeChild(ta);
    };
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(done, () => { fallback(); done(); });
    } else { fallback(); done(); }
  }

  function reset() {
    Object.assign(state, DEFAULTS);
    el.minSize.value = DEFAULTS.minSize; el.maxSize.value = DEFAULTS.maxSize;
    el.minBp.value = DEFAULTS.minBp; el.maxBp.value = DEFAULTS.maxBp;
    el.viewportInput.value = DEFAULTS.previewVw;
    el.previewText.textContent = "";
    render();
  }

  // Events

  // Each numeric field supports arithmetic like "18*1.5" or "1440-80".
  // Live typing updates the preview from the evaluated value; pressing
  // Enter or leaving the field replaces the text with the result.
  function bindField(input, key) {
    input.addEventListener("input", () => {
      // allow only digits and math characters (x/× accepted as multiply)
      const cleaned = input.value.replace(/[^0-9+\-*/(). x×X]/g, "");
      if (cleaned !== input.value) input.value = cleaned;
      const v = evalExpr(input.value);
      state[key] = v === null ? num(input.value) : v;
      render();
    });
    const commit = () => {
      const v = evalExpr(input.value);
      // invalid or empty → fall back to 0; never negative
      let val = v === null ? 0 : v;
      if (val < 0) val = 0;
      input.value = fmt(val);
      state[key] = val;
      render();
    };
    input.addEventListener("change", commit);
    input.addEventListener("blur", commit);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); commit(); input.blur(); }
      if (e.key === "ArrowUp" || e.key === "ArrowDown") {
        e.preventDefault();
        const step = e.shiftKey ? 10 : 1;
        const cur = evalExpr(input.value);
        const base = cur === null ? 0 : cur;
        const next = Math.max(0, base + (e.key === "ArrowUp" ? step : -step));
        input.value = fmt(next);
        state[key] = next;
        render();
      }
    });
  }

  bindField(el.maxSize, "maxSize");
  bindField(el.minSize, "minSize");
  bindField(el.maxBp, "maxBp");
  bindField(el.minBp, "minBp");

  el.slider.addEventListener("input", (e) => { state.previewVw = num(e.target.value); render(); });

  // Viewport field — accepts arithmetic like the other inputs. Committing a
  // value (Enter/blur) makes it the user's default, so the reset icon comes
  // back here.
  el.viewportInput.addEventListener("input", () => {
    const cleaned = el.viewportInput.value.replace(/[^0-9+\-*/(). x×X]/g, "");
    if (cleaned !== el.viewportInput.value) el.viewportInput.value = cleaned;
    const v = evalExpr(el.viewportInput.value);
    if (v !== null) { state.previewVw = v; render(); }
  });
  const commitViewport = () => {
    const v = evalExpr(el.viewportInput.value);
    const lo = Math.min(state.minBp, state.maxBp);
    const hi = Math.max(state.minBp, state.maxBp);
    // invalid → fall back to the existing default rather than 0, which
    // would be a nonsense viewport
    let val = v === null ? state.defaultVw : v;
    val = Math.max(lo, Math.min(hi, val));
    state.previewVw = val;
    state.defaultVw = val;
    el.viewportInput.value = Math.round(val);
    render();
  };
  el.viewportInput.addEventListener("change", commitViewport);
  el.viewportInput.addEventListener("blur", commitViewport);
  el.viewportInput.addEventListener("keydown", (e) => {
    e.stopPropagation();
    if (e.key === "Enter") { e.preventDefault(); commitViewport(); el.viewportInput.blur(); }
    if (e.key === "ArrowUp" || e.key === "ArrowDown") {
      e.preventDefault();
      const step = e.shiftKey ? 10 : 1;
      const cur = evalExpr(el.viewportInput.value);
      const base = cur === null ? state.previewVw : cur;
      const lo = Math.min(state.minBp, state.maxBp);
      const hi = Math.max(state.minBp, state.maxBp);
      const next = Math.max(lo, Math.min(hi, base + (e.key === "ArrowUp" ? step : -step)));
      el.viewportInput.value = Math.round(next);
      state.previewVw = next;
      render();
    }
  });

  el.viewportReset.addEventListener("click", () => {
    state.previewVw = state.defaultVw;
    el.viewportInput.value = Math.round(state.defaultVw);
    render();
  });

  el.modeButtons.forEach((b) =>
    b.addEventListener("click", () => { state.mode = b.dataset.mode; render(); }));
  el.unitButtons.forEach((b) =>
    b.addEventListener("click", () => { state.unit = b.dataset.unit; render(); }));

  el.copyBtn.addEventListener("click", copy);
  el.clearBtn.addEventListener("click", reset);
  el.wordmark.addEventListener("click", reset);

  // Editable preview text
  el.previewText.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); el.previewText.blur(); }
    e.stopPropagation();
  });
  el.previewText.addEventListener("input", () => {
    const t = el.previewText.textContent;
    if (t.length > 12) {
      el.previewText.textContent = t.slice(0, 12);
      // move caret to end after truncating
      const r = document.createRange();
      r.selectNodeContents(el.previewText);
      r.collapse(false);
      const s = window.getSelection();
      s.removeAllRanges(); s.addRange(r);
    }
    render();
  });
  el.previewText.addEventListener("blur", () => {
    // leave empty so the placeholder shows
  });

  window.addEventListener("keydown", (e) => {
    const editing = document.activeElement === el.previewText;
    const key = (e.key || "").toLowerCase();
    if ((e.metaKey || e.ctrlKey) && key === "c") {
      if (editing) return;
      const sel = (window.getSelection && window.getSelection().toString()) || "";
      if (sel.trim() !== "") return;
      e.preventDefault();
      copy();
    } else if (key === "escape") {
      if (editing) { el.previewText.blur(); return; }
      reset();
    }
  });

  window.addEventListener("resize", render);

  render();
  requestAnimationFrame(render); // re-fit once stage has real dimensions
})();
  </script>
</body>
</html>
